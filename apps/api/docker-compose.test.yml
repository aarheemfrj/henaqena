version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: henaqena
      POSTGRES_PASSWORD: henaqena
      POSTGRES_DB: henaqena_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U henaqena -d henaqena_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - /tmp/postgres-test:/var/lib/postgresql/data
